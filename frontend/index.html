<!doctype html>
<html lang="en" class="dark" data-theme="dark" data-role="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        try {
          const saved = window.localStorage.getItem("goalai_theme");
          const theme = saved === "light" || saved === "dark" ? saved : "dark";
          const root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.dataset.theme = theme;
          if (!root.dataset.role) root.dataset.role = "hr";
        } catch {
          // keep default dark
        }
      })();
    </script>
    <title>GoalAI Platform</title>
    <meta
      name="description"
      content="AI-платформа для SMART-оценки, генерации целей и HR-аналитики."
    />
    <meta name="author" content="GoalAI Team" />

    <meta property="og:title" content="GoalAI Platform" />
    <meta
      property="og:description"
      content="AI-платформа для SMART-оценки, генерации целей и HR-аналитики."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/placeholder.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GoalAI Platform" />
    <meta
      name="twitter:description"
      content="AI-платформа для SMART-оценки, генерации целей и HR-аналитики."
    />
    <meta name="twitter:image" content="/placeholder.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
