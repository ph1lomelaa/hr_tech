version: "3.9"

services:
  api:
    build: .
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/goalai
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      UVICORN_WORKERS: 2
      UVICORN_LIMIT_CONCURRENCY: 300
      UVICORN_BACKLOG: 1024
      UVICORN_TIMEOUT_KEEP_ALIVE: 20
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./app:/app/app
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: goalai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.18
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

volumes:
  pgdata:
  chromadata:
