services:
  backend-api:
    container_name: goalai_backend
    build: ./backend
    ports:
      - "8002:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/goalai
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      UVICORN_WORKERS: 1
      UVICORN_LIMIT_CONCURRENCY: 300
      UVICORN_BACKLOG: 1024
      UVICORN_TIMEOUT_KEEP_ALIVE: 20
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped
    networks:
      - default
      - caddy

  frontend:
    container_name: goalai_frontend
    build: ./frontend
    environment:
      VITE_API_PROXY: http://goalai_backend:8000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend-api
    command: >
      sh -c "if [ ! -d node_modules ]; then npm ci; fi; npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - default
      - caddy

  postgres:
    container_name: goalai_postgres
    image: postgres:17
    environment:
      POSTGRES_DB: goalai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - goalai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chromadb:
    container_name: goalai_chromadb
    image: chromadb/chroma:0.5.18
    volumes:
      - goalai_chromadata:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    restart: unless-stopped

networks:
  caddy:
    external: true
    name: bull_project_default

volumes:
  goalai_pgdata:
  goalai_chromadata:
