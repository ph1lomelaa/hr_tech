services:
  backend-api:
    build: ./backend
    ports:
      - "8002:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/goalai
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      UVICORN_WORKERS: 1
      UVICORN_LIMIT_CONCURRENCY: 300
      UVICORN_BACKLOG: 1024
      UVICORN_TIMEOUT_KEEP_ALIVE: 20
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      VITE_API_PROXY: http://backend-api:8000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend-api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ]; then npm ci; fi;
             npm run dev -- --host 0.0.0.0 --port 8080"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: goalai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.18
    volumes:
      - chromadata:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

volumes:
  pgdata:
  chromadata:
  frontend_node_modules:
